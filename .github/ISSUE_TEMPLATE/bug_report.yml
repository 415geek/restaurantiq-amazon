name: 缺陷反馈
description: 提交一个可复现的缺陷
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 发生了什么？
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请提供可复现的完整步骤
      placeholder: |
        1. 进入 ...
        2. 点击 ...
        3. 出现 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: 环境信息
      placeholder: |
        - 浏览器：
        - 设备：
        - 页面/URL：
        - 构建版本/commit：

  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
