name: 功能需求
description: 提出新功能或优化建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 业务问题
      description: 这个需求要解决什么问题？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 方案描述
      description: 期望的交互与行为是什么？
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      placeholder: |
        - [ ] 标准 1
        - [ ] 标准 2

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true
